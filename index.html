<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sites Didácticos — Catálogo de cursos</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <header>
    <nav class="catalog-nav">
      <span class="nav-brand">📚 Sites Didácticos</span>
    </nav>
  </header>

  <section class="hero">
    <div class="badge">Materiales de estudio gratuitos</div>
    <h1>Catálogo de cursos</h1>
    <p>Selecciona un curso para comenzar. Cada curso es independiente.</p>
  </section>

  <main class="section" id="catalogMain">
  </main>

  <footer>
    <p>Sites Didácticos &mdash; Materiales educativos de acceso libre</p>
  </footer>

  <script>
    (function () {
      const colorLabel = { ccna: 'Redes', python: 'Python', linux: 'Linux', adm: 'Soporte' };

      const CATALOG_FALLBACK = {
        "sections": [
          {
            "id": "ccna",
            "titulo": "🌐 Redes — CCNA",
            "cursos": [
              {
                "id": "ccna1",
                "titulo": "CCNA 1",
                "descripcion": "Introducción a redes: modelo OSI, TCP/IP, direccionamiento IP, subnetting y VLSM.",
                "icono": "🌐",
                "color": "ccna",
                "url": "ccna/ccna1/index.html",
                "nivel": "Principiante",
                "estado": "activo"
              },
              {
                "id": "ccna2",
                "titulo": "CCNA 2",
                "descripcion": "Switching y enrutamiento: VLANs, STP, OSPF, EIGRP y enrutamiento estático.",
                "icono": "🔀",
                "color": "ccna",
                "url": "ccna/ccna2/index.html",
                "nivel": "Intermedio",
                "estado": "proximamente"
              }
            ]
          },
          {
            "id": "python",
            "titulo": "🐍 Programación — Python",
            "cursos": [
              {
                "id": "python-fundamentos",
                "titulo": "Python — Fundamentos",
                "descripcion": "Variables, tipos de datos, condicionales, bucles, funciones y estructuras de datos básicas.",
                "icono": "🐍",
                "color": "python",
                "url": "python/fundamentos/index.html",
                "nivel": "Principiante",
                "estado": "proximamente"
              }
            ]
          },
          {
            "id": "linux",
            "titulo": "🐧 Sistemas — Linux",
            "cursos": [
              {
                "id": "linux-basico",
                "titulo": "Linux — Básico",
                "descripcion": "Comandos esenciales, sistema de archivos, permisos, usuarios y procesos.",
                "icono": "🐧",
                "color": "linux",
                "url": "linux/basico/index.html",
                "nivel": "Principiante",
                "estado": "proximamente"
              }
            ]
          },
          {
            "id": "adm-soporte",
            "titulo": "🖥️ Informática — Soporte",
            "cursos": [
              {
                "id": "adm-soporte-computadoras",
                "titulo": "Administración y Soporte",
                "descripcion": "Diagnóstico de hardware, reparabilidad, actualización de equipos y criterios de inversión técnica.",
                "icono": "🖥️",
                "color": "adm",
                "url": "administracion_y_soporte_computadoras/index.html",
                "nivel": "Técnico",
                "estado": "activo"
              }
            ]
          }
        ]
      };

      function renderCatalog(data) {
        const main = document.getElementById('catalogMain');
        let html = '';
        data.sections.forEach(function (section, sectionIndex) {
          const marginStyle = sectionIndex > 0 ? ' style="margin-top:2.5rem;"' : '';
          html += '<p class="section-title"' + marginStyle + '>' + section.titulo + '</p>\n';
          html += '<div class="cards">\n';
          section.cursos.forEach(function (curso) {
            const label = colorLabel[curso.color] || curso.color;
            html += '  <a class="card" href="' + curso.url + '">\n';
            html += '    <div class="card-icon ' + curso.color + '">' + curso.icono + '</div>\n';
            html += '    <h3>' + curso.titulo + '</h3>\n';
            html += '    <p>' + curso.descripcion + '</p>\n';
            html += '    <div class="card-meta">\n';
            html += '      <span class="tag ' + curso.color + '">' + label + '</span>\n';
            html += '      <span class="tag">' + curso.nivel + '</span>\n';
            html += '    </div>\n';
            html += '  </a>\n';
          });
          html += '</div>\n';
        });
        main.innerHTML = html;
      }

      fetch('assets/data/catalog.json')
        .then(function (response) {
          if (!response.ok) { throw new Error('HTTP ' + response.status); }
          return response.json();
        })
        .then(function (data) {
          renderCatalog(data);
        })
        .catch(function () {
          renderCatalog(CATALOG_FALLBACK);
        });
    })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .catch(() => {}); // silently ignore if registration fails (e.g., file://)
    }
  </script>

</body>
</html>
