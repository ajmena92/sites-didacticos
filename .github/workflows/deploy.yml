name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: cd astro-site && npm ci

      - name: Build Astro
        run: cd astro-site && npm run build

      - name: Copy static HTML site into dist
        run: |
          rsync -av --exclude='astro-site/' --exclude='.git/' --exclude='.github/' \
            --exclude='.claude/' --exclude='.worktrees/' --exclude='node_modules/' \
            --exclude='dist/' --exclude='*.md' \
            ./ astro-site/dist/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: astro-site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
